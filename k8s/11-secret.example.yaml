# (or: kubectl -n reference-python create secret generic app-secrets \
#        --from-env-file=<(grep ANTHROPIC_API_KEY .env))
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: reference-python
type: Opaque
