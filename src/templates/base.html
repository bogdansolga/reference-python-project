<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Product API{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media (prefers-color-scheme: dark) {
            html { color-scheme: dark; }
        }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen">
    <main class="max-w-2xl mx-auto p-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Chat Widget -->
    <div id="chat-widget" class="fixed bottom-4 right-4 z-50">
        <!-- Toggle Button -->
        <button id="chat-toggle" onclick="toggleChat()"
            class="px-4 py-3 bg-zinc-900 dark:bg-zinc-800 text-white rounded-lg shadow-xl hover:bg-zinc-800 dark:hover:bg-zinc-700 flex items-center gap-2 text-sm font-medium">
            <span>💬</span> Ask AI
        </button>

        <!-- Chat Panel (hidden by default) -->
        <div id="chat-panel" class="hidden w-96 h-[34rem] bg-zinc-900 border border-zinc-700 rounded-lg shadow-lg flex flex-col text-white">
            <div class="p-3 border-b border-zinc-700 flex justify-between items-center">
                <span class="font-medium">Chat</span>
                <button onclick="toggleChat()" class="text-zinc-400 hover:text-white">✕</button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Messages will be added here -->
            </div>
            <form onsubmit="sendMessage(event)" class="p-3 border-t border-zinc-700">
                <input id="chat-input" type="text" placeholder="Ask something..."
                    class="w-full px-3 py-2 bg-zinc-800 border border-zinc-600 rounded text-sm text-white placeholder-zinc-400">
            </form>
        </div>
    </div>

    <script>
        const messages = [];
        let isStreaming = false;

        function toggleChat() {
            const toggle = document.getElementById('chat-toggle');
            const panel = document.getElementById('chat-panel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                panel.classList.add('flex');
                toggle.classList.add('hidden');
                document.getElementById('chat-input').focus();
            } else {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
                toggle.classList.remove('hidden');
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `text-sm ${role === 'user' ? 'text-right' : 'text-left'}`;
            const formatted = role === 'user' ? escapeHtml(content) : renderMarkdown(content);
            div.innerHTML = `<div class="inline-block px-3 py-2 rounded max-w-[85%] ${role === 'user' ? 'bg-blue-600' : 'bg-zinc-700'}">${formatted}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.querySelector('div');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            let html = escapeHtml(text);
            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre class="bg-zinc-800 p-2 rounded text-xs overflow-x-auto my-1"><code>$2</code></pre>');
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code class="bg-zinc-800 px-1 rounded text-xs">$1</code>');
            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        async function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || isStreaming) return;

            input.value = '';
            messages.push({ role: 'user', content: text });
            addMessage('user', text);

            isStreaming = true;
            const assistantDiv = addMessage('assistant', '...');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Request failed');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    assistantContent += decoder.decode(value);
                    assistantDiv.textContent = assistantContent;
                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                }

                // Render markdown after streaming completes
                assistantDiv.innerHTML = renderMarkdown(assistantContent);
                messages.push({ role: 'assistant', content: assistantContent });
            } catch (error) {
                assistantDiv.className = 'inline-block px-3 py-2 rounded max-w-[85%] bg-red-900 text-red-200';
                assistantDiv.textContent = error.message;
            } finally {
                isStreaming = false;
            }
        }
    </script>
</body>
</html>
