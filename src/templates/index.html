{% extends "base.html" %}

{% block title %}Product API{% endblock %}

{% block content %}
<main class="flex min-h-screen flex-col items-center justify-center p-8">
    <h1 class="font-semibold text-2xl">Product API</h1>
    <p class="mt-2 text-zinc-600 dark:text-zinc-400">The API endpoints are available at /api/v1</p>

    <div class="mt-6">
        {% if user %}
        <div class="text-center">
            <p class="text-sm text-zinc-600 dark:text-zinc-400">
                Logged in as <span class="font-semibold">{{ user.username }}</span> ({{ user.role }})
            </p>
            <div class="mt-4 flex gap-4">
                <a class="rounded-md bg-zinc-900 px-4 py-2 text-white hover:bg-zinc-800 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-200" href="/sections">Sections</a>
                <a class="rounded-md bg-zinc-900 px-4 py-2 text-white hover:bg-zinc-800 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-200" href="/products">Products</a>
            </div>
            <form action="/logout" method="POST">
                <button type="submit" class="mt-2 px-4 py-2 text-sm text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100">Logout</button>
            </form>
        </div>
        {% else %}
        <a class="rounded-md bg-zinc-900 px-4 py-2 text-white hover:bg-zinc-800 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-200" href="/login">Login</a>
        {% endif %}
    </div>
</main>
{% endblock %}
