{% extends "base.html" %}

{% block title %}Sections - Product API{% endblock %}

{% block content %}
<main class="mx-auto min-h-screen max-w-2xl p-8">
    <div class="mb-6 flex items-center justify-between">
        <h1 class="font-semibold text-2xl">Sections</h1>
        <a class="text-sm text-zinc-600 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100" href="/">← Back</a>
    </div>

    {% if sections %}
    <ul class="space-y-2">
        {% for section in sections %}
        <li class="rounded-md border p-3 dark:border-zinc-700">{{ section.name }}</li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-zinc-500">No sections found.</p>
    {% endif %}
</main>
{% endblock %}
