{% extends "base.html" %}

{% block title %}Login - Product API{% endblock %}

{% block content %}
<main class="flex min-h-screen flex-col items-center justify-center p-8">
    <div class="w-full max-w-sm">
        <h1 class="mb-6 text-center font-semibold text-2xl">Login</h1>

        <form method="POST" class="space-y-4">
            <div>
                <label for="username" class="mb-1 block font-medium text-sm">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full rounded-md border px-3 py-2 dark:border-zinc-700 dark:bg-zinc-800">
            </div>
            <div>
                <label for="password" class="mb-1 block font-medium text-sm">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full rounded-md border px-3 py-2 dark:border-zinc-700 dark:bg-zinc-800">
            </div>

            {% if error %}
            <p class="text-red-500 text-sm">{{ error }}</p>
            {% endif %}

            <button type="submit"
                class="w-full rounded-md bg-zinc-900 px-4 py-2 text-white hover:bg-zinc-800 disabled:opacity-50 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-200">
                Login
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-zinc-500">
            <p>Test credentials:</p>
            <p class="font-mono">user / user (USER role)</p>
            <p class="font-mono">admin / admin (ADMIN role)</p>
        </div>
    </div>
</main>
{% endblock %}
