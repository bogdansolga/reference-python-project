{% extends "base.html" %}

{% block title %}Login - Product API{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6">Login</h1>

{% if error %}
<div class="mb-4 p-4 bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200 rounded-lg">
    {{ error }}
</div>
{% endif %}

<form method="POST" class="space-y-4">
    <div>
        <label for="username" class="block text-sm font-medium mb-1">Username</label>
        <input type="text" id="username" name="username" required
            class="w-full px-3 py-2 border border-zinc-300 dark:border-zinc-700 rounded bg-white dark:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-500">
    </div>
    <div>
        <label for="password" class="block text-sm font-medium mb-1">Password</label>
        <input type="password" id="password" name="password" required
            class="w-full px-3 py-2 border border-zinc-300 dark:border-zinc-700 rounded bg-white dark:bg-zinc-800 focus:outline-none focus:ring-2 focus:ring-zinc-500">
    </div>
    <button type="submit" class="w-full px-4 py-2 bg-zinc-800 dark:bg-zinc-700 text-white rounded hover:bg-zinc-700 dark:hover:bg-zinc-600">
        Login
    </button>
</form>

<p class="mt-6 text-sm text-zinc-600 dark:text-zinc-400">
    Test credentials: <code class="bg-zinc-200 dark:bg-zinc-800 px-1 rounded">user/user</code> or <code class="bg-zinc-200 dark:bg-zinc-800 px-1 rounded">admin/admin</code>
</p>

<a href="/" class="inline-block mt-4 text-sm text-zinc-600 dark:text-zinc-400 hover:underline">&larr; Back</a>
{% endblock %}
